<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registration Successful - Saathi</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    body { background: #0a0510; color: #ffffff; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
    
    .success-container { 
        background: #1a0b2e; 
        border: 1px solid #4a2377; 
        border-radius: 15px; 
        padding: 40px; 
        width: 100%; 
        max-width: 400px; 
        text-align: center; 
        box-shadow: 0 0 20px rgba(138, 43, 226, 0.3); 
    }
    h1 { color: #9b59b6; margin-bottom: 15px; }
    p { color: #a093b5; margin-bottom: 25px; line-height: 1.6; }
    .home-btn { 
        display: inline-block; 
        padding: 12px 25px; 
        background: #9b59b6; 
        color: white; 
        text-decoration: none; 
        border-radius: 6px; 
        font-weight: bold; 
        transition: background 0.3s; 
    }
    .home-btn:hover { background: #8e44ad; }
  </style>
</head>
<body>

<div class="success-container">
  <h1>Welcome to Saathi!</h1>
  <p>Your professional profile has been successfully registered. You are now part of our trusted community.</p>
  <a href="/" class="home-btn">Return to Home</a>
</div>

</body>
</html>
